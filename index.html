<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Circuit">
<meta name="theme-color" content="#0A0B0E">
<meta name="mobile-web-app-capable" content="yes">
<title>Circuit Training</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▲</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0A0B0E;--surface:#111318;--surface-light:#181B22;
--border:#1F2430;--border-light:#2A3040;
--amber:#E4A832;--amber-dim:#9A7425;--amber-glow:#E4A83240;
--green:#34D399;--green-bright:#4ADE80;--green-dim:#166534;
--red:#F87171;--red-glow:#F8717130;--blue:#60A5FA;--cyan:#22D3EE;--purple:#A78BFA;
--text:#D1D5DB;--text-bright:#F3F4F6;--text-dim:#6B7280;--text-muted:#4B5563;
--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed','Oswald',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;border:none;background:none}
button:active{opacity:.78;transform:scale(.98)}
.screen{display:none;min-height:100vh;min-height:100dvh}.screen.active{display:flex;flex-direction:column}

#home{padding:24px 20px 32px;max-width:520px;margin:0 auto;width:100%}
.home-header{margin-bottom:20px}
.home-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.home-logo span{color:var(–amber);font-size:20px;font-weight:800}
.home-logo h1{font-size:26px;font-weight:800;color:var(–text-bright);letter-spacing:2px;margin:0}
.home-sub{color:var(–text-dim);font-size:12px;letter-spacing:1.5px;margin-top:4px}

.mode-row{display:flex;gap:6px;margin-bottom:20px;background:var(–surface);border-radius:8px;padding:4px;border:1px solid var(–border)}
.mode-btn{flex:1;text-align:center;padding:10px 6px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:1.5px;transition:all .2s}

.energy-label{color:var(–text-dim);font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.energy-row{display:flex;gap:8px;margin-bottom:20px}
.energy-btn{flex:1;border-radius:10px;padding:12px 6px;text-align:center;transition:all .2s;border-width:2px;border-style:solid}
.energy-icon{font-size:20px;margin-bottom:2px}
.energy-name{font-size:12px;font-weight:800;letter-spacing:1.5px}
.energy-desc{font-size:8px;margin-top:3px;line-height:1.3;letter-spacing:.2px}

.day-btn{display:block;width:100%;background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:18px 16px;margin-bottom:8px;text-align:left;transition:border-color .15s}
.day-btn-top{display:flex;justify-content:space-between;align-items:center}
.day-btn-label{display:flex;align-items:baseline;gap:8px}
.day-btn-id{font-size:24px;font-weight:800;font-family:‘Oswald’,sans-serif}
.day-btn-title{color:var(–text-bright);font-size:15px;font-weight:700;letter-spacing:1px}
.day-btn-focus{color:var(–text-dim);font-size:11px;margin-top:3px;letter-spacing:.5px}
.day-btn-meta{color:var(–text-muted);font-size:9px;margin-top:2px;letter-spacing:.5px}
.day-btn-arrow{color:var(–amber-dim);font-size:22px;font-weight:300}
.bottom-btns{margin-top:16px;display:flex;gap:8px}
.history-btn,.clear-btn{flex:1;border:1px solid var(–border);border-radius:8px;padding:14px 12px;text-align:center;color:var(–text-dim);font-size:11px;font-weight:700;letter-spacing:1.5px}
.clear-btn{color:var(–text-muted);font-size:10px}

#workout{position:relative}
.wk-topbar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(–border)}
.wk-end{color:var(–text-dim);font-size:13px;font-weight:700;letter-spacing:1px;padding:6px 4px}
.wk-step-count{color:var(–text-dim);font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.wk-progress{height:3px;background:var(–border)}
.wk-progress-bar{height:100%;background:linear-gradient(90deg,var(–amber),var(–green-bright));transition:width .4s ease}
.wk-body{flex:1;padding:18px 16px;display:flex;flex-direction:column}
.wk-circuit-tag{display:inline-block;padding:4px 10px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:2px;margin-right:6px}
.wk-circuit-sub{color:var(–text-dim);font-size:10px;letter-spacing:1.5px;font-weight:600}
.wk-round-tag{color:var(–blue);font-size:10px;font-weight:700;letter-spacing:1px;margin-left:8px}
.wk-name{font-size:30px;font-weight:800;color:var(–text-bright);line-height:1.15;letter-spacing:.5px;margin:14px 0 4px;font-family:‘Oswald’,sans-serif;text-transform:uppercase}
.wk-muscles{color:var(–text-dim);font-size:11px;letter-spacing:.5px}
.wk-reps{font-size:48px;font-weight:800;color:var(–green-bright);font-family:‘Oswald’,sans-serif;font-variant-numeric:tabular-nums;margin:10px 0 14px;line-height:1}
.wk-detail-toggle{border:1px solid var(–border);border-radius:8px;padding:12px 14px;color:var(–text-dim);font-size:12px;font-weight:700;letter-spacing:1.5px;text-align:left;margin-bottom:6px;transition:all .15s}
.wk-detail-toggle.open{background:var(–surface-light);border-color:var(–border-light);color:var(–amber)}
.wk-detail{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:14px 16px;margin-top:4px;display:none;max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wk-detail.open{display:block}
.wk-detail-section{margin-bottom:12px}.wk-detail-section:last-child{margin-bottom:0}
.wk-detail-label{font-size:9px;font-weight:800;letter-spacing:2.5px;margin-bottom:4px}
.wk-detail-text{font-size:13px;color:var(–text);line-height:1.6}
.wk-actions{display:flex;gap:10px;margin-top:14px;padding-bottom:max(20px,var(–safe-bottom))}
.wk-skip{flex:1;border:1px solid var(–border);border-radius:12px;padding:20px 0;color:var(–text-dim);font-size:14px;font-weight:700;letter-spacing:2px}
.wk-done{flex:2.5;border-radius:12px;padding:20px 0;color:var(–bg);font-size:18px;font-weight:800;letter-spacing:3px;font-family:‘Oswald’,sans-serif}

#rest-overlay{position:fixed;inset:0;background:var(–bg);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;transition:background .3s}
#rest-overlay.active{display:flex}#rest-overlay.flash{background:#F8717115}
.rest-label{color:var(–text-dim);font-size:14px;letter-spacing:4px;font-weight:700;margin-bottom:16px}
.rest-number{font-size:100px;font-weight:800;font-family:‘Oswald’,sans-serif;font-variant-numeric:tabular-nums;line-height:1;transition:color .3s,text-shadow .3s}
.rest-number.urgent{color:var(–red)!important;text-shadow:0 0 40px var(–red-glow)!important}
.rest-bar-bg{width:60%;max-width:260px;height:4px;background:var(–border);border-radius:2px;margin-top:24px}
.rest-bar{height:100%;border-radius:2px;transition:width 1s linear,background .3s}
.rest-skip{margin-top:40px;border:1px solid var(–border);color:var(–text-dim);padding:16px 40px;border-radius:8px;font-size:14px;font-weight:600;letter-spacing:2px}

#complete{align-items:center;justify-content:center;padding:24px}
.complete-check{font-size:56px;margin-bottom:20px}
.complete-title{font-size:28px;font-weight:800;letter-spacing:3px;margin-bottom:10px}
.complete-sub{color:var(–text-dim);font-size:15px;margin-bottom:4px}
.complete-energy{font-size:12px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px}
.complete-dur{color:var(–text-muted);font-size:13px;margin-bottom:36px}
.complete-btn{border-radius:10px;padding:20px 52px;font-size:16px;font-weight:800;letter-spacing:2px}

#history-screen{padding:24px 16px;max-width:520px;margin:0 auto;width:100%}
.hist-back{color:var(–amber);font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:20px;padding:8px 0}
.hist-title{font-size:16px;font-weight:800;color:var(–text-bright);letter-spacing:1.5px;margin-bottom:20px}
.hist-empty{color:var(–text-dim);font-size:13px;text-align:center;margin-top:40px;line-height:1.6}
.hist-date{font-size:11px;font-weight:700;color:var(–text-dim);letter-spacing:2px;margin-bottom:8px}
.hist-entry{background:var(–surface);border:1px solid var(–border);border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.hist-group{margin-bottom:16px}
</style>

</head>
<body>
<div id="home" class="screen active">
  <div class="home-header">
    <div class="home-logo"><span>▲</span><h1>CIRCUIT TRAINING</h1></div>
    <div class="home-sub">CLIMBING · STRENGTH · DEFINITION</div>
  </div>
  <div class="mode-row" id="mode-row"></div>
  <div class="energy-label">HOW DO YOU FEEL TODAY?</div>
  <div class="energy-row" id="energy-row"></div>
  <div id="mode-desc" style="color:var(--text-muted);font-size:10px;letter-spacing:.5px;margin-bottom:14px;line-height:1.5"></div>
  <div id="day-buttons"></div>
  <div class="bottom-btns">
    <button class="history-btn" id="history-btn">HISTORY (<span id="hist-count">0</span>)</button>
    <button class="clear-btn" id="clear-btn">CLEAR</button>
  </div>
</div>
<div id="workout" class="screen">
  <div class="wk-topbar">
    <button class="wk-end" id="wk-end-btn">✕ END</button>
    <div id="wk-topbar-center" style="display:flex;align-items:center;gap:6px"></div>
    <div class="wk-step-count" id="wk-step-count"></div>
  </div>
  <div class="wk-progress"><div class="wk-progress-bar" id="wk-progress-bar"></div></div>
  <div class="wk-body">
    <div id="wk-circuit-info" style="margin-bottom:14px"></div>
    <div class="wk-name" id="wk-name"></div>
    <div class="wk-muscles" id="wk-muscles"></div>
    <div class="wk-reps" id="wk-reps"></div>
    <button class="wk-detail-toggle" id="wk-detail-toggle">▸ SHOW FORM GUIDE</button>
    <div class="wk-detail" id="wk-detail"></div>
    <div style="flex:1"></div>
    <div class="wk-actions">
      <button class="wk-skip" id="wk-skip-btn">SKIP</button>
      <button class="wk-done" id="wk-done-btn">DONE ✓</button>
    </div>
  </div>
</div>
<div id="rest-overlay">
  <div class="rest-label">REST</div>
  <div class="rest-number" id="rest-number">60</div>
  <div class="rest-bar-bg"><div class="rest-bar" id="rest-bar"></div></div>
  <button class="rest-skip" id="rest-skip-btn">SKIP</button>
</div>
<div id="complete" class="screen">
  <div class="complete-check">✓</div>
  <div class="complete-title" id="complete-title">SESSION COMPLETE</div>
  <div class="complete-sub" id="complete-sub"></div>
  <div class="complete-energy" id="complete-energy"></div>
  <div class="complete-dur" id="complete-dur"></div>
  <button class="complete-btn" id="complete-btn">DONE</button>
</div>
<div id="history-screen" class="screen">
  <button class="hist-back" id="hist-back-btn">← BACK</button>
  <div class="hist-title">SESSION HISTORY</div>
  <div id="hist-list"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// MODE & ENERGY CONFIG
// ═══════════════════════════════════════════════════════════════════════
var MODES={
  home:{label:"HOME",icon:"🏠",color:"#E4A832",desc:"Bodyweight circuits · Mat, pull-up bar, resistance band"},
  gym:{label:"GYM",icon:"🏋️",color:"#22D3EE",desc:"Minimum Bouldering · KB, DB, rings, TRX, hangboard, campus board"},
  fingers:{label:"FINGERS",icon:"🤏",color:"#A78BFA",desc:"Hangboard protocol · 20mm edges · Strength & endurance"}
};
var ENERGY={
  fresh:{label:"FRESH",icon:"⚡",color:"#4ADE80",repMult:1.2,roundOffset:0,restOffset:0,desc:"+20% reps · full rounds"},
  normal:{label:"NORMAL",icon:"●",color:"#E4A832",repMult:1.0,roundOffset:0,restOffset:10,desc:"Baseline · +10s rest"},
  tired:{label:"TIRED",icon:"◒",color:"#F87171",repMult:.75,roundOffset:-1,restOffset:20,desc:"−25% reps · −1 round"}
};
function scaleReps(s,m){return s.replace(/(\d+)/g,function(x){var n=parseInt(x);return n<=3?x:Math.max(3,Math.round(n*m))})}

// ═══════════════════════════════════════════════════════════════════════
// EXERCISE DATA — HOME
// ═══════════════════════════════════════════════════════════════════════
var HOME_DAYS=[
{id:"A",title:"PUSH + CORE",focus:"Chest · Shoulders · Triceps · Abs",circuits:[
{name:"CIRCUIT 1",subtitle:"CHEST & SHOULDERS",rounds:3,restSeconds:60,exercises:[
{name:"Wide Push-Ups",reps:"12–15",muscles:"Outer chest, front delts",setup:"Hands 1.5× shoulder width, fingers slightly outward.",execution:"3s negative, chest to floor, explosive up.",cue:"Spread the floor apart with your hands.",breathing:"Inhale down, exhale up.",mistakes:"Elbows at 90° (keep ~45°), sagging back."},
{name:"Diamond Push-Ups",reps:"10–12",muscles:"Inner chest, triceps",setup:"Hands together, diamond shape. Elbows tight.",execution:"Lower chest to hands, elbows along ribs. Full lockout.",cue:"Crush something between your pecs at the top.",breathing:"Inhale down, exhale up.",mistakes:"Elbows flaring wide, incomplete depth."},
{name:"Pike Push-Ups (feet elevated)",reps:"8–10",muscles:"Anterior delts, upper chest, triceps",setup:"Feet on chair. Walk hands back to inverted V. Hips high.",execution:"Lower head between hands toward floor. Press back up.",cue:"Press the floor away from you.",breathing:"Inhale down, exhale up.",mistakes:"Not enough hip angle, looking forward."},
{name:"Band Front + Lateral Raise",reps:"10+10",muscles:"Front & side deltoids",setup:"Stand on band, arms at sides, slight elbow bend.",execution:"10 front raises then 10 lateral raises. No rest between.",cue:"Lead with pinky on lateral raises.",breathing:"Exhale on every raise.",mistakes:"Swinging, shrugging shoulders, going above shoulder height."}]},
{name:"CIRCUIT 2",subtitle:"SHOULDERS & CORE",rounds:3,restSeconds:45,exercises:[
{name:"Decline Push-Ups",reps:"10–12",muscles:"Upper chest, front delts",setup:"Feet elevated, hands slightly wider than shoulders.",execution:"2s negative, explosive up. Angle hits upper chest.",cue:"Aim sternum at the floor between hands.",breathing:"Inhale down, exhale up.",mistakes:"Feet too high, sagging hips."},
{name:"Band Overhead Press",reps:"12–15",muscles:"All deltoid heads, triceps",setup:"Stand on band, palms forward at shoulder height.",execution:"Press overhead to full lockout. Lower slowly. Core braced.",cue:"Push head through the window of your arms.",breathing:"Exhale press, inhale return.",mistakes:"Arching back, pressing forward."},
{name:"High Plank Knee-to-Opposite-Elbow",reps:"12 / side",muscles:"Obliques, transverse abs",setup:"High plank, hands under shoulders, core locked.",execution:"Right knee to left elbow, slow cross-body crunch. Alternate.",cue:"The intention to reach drives the rotation.",breathing:"Exhale across, inhale return.",mistakes:"Rushing, hips rocking."},
{name:"Russian Twists",reps:"20 total",muscles:"Obliques, rectus abdominis",setup:"Seated, knees bent, feet off ground, lean back 45°.",execution:"Touch hands to floor each side. Each touch = 1 rep.",cue:"Rotate from ribcage, not just arms.",breathing:"Exhale each rotation.",mistakes:"Only moving arms, feet on ground."}]},
{name:"FINISHER",subtitle:"CORE BURN",rounds:2,restSeconds:30,exercises:[
{name:"Plank Knee-to-Elbow (same side)",reps:"10 / side",muscles:"Obliques, hip flexors",setup:"High plank, hands under shoulders.",execution:"Right knee to right elbow outside body. Squeeze. Return.",cue:"Crunch sideways toward elbow.",breathing:"Exhale crunch, inhale return.",mistakes:"Hips rotating open, rushing."},
{name:"Hollow Body Hold",reps:"30 seconds",muscles:"Deep abs, hip flexors",setup:"On back, arms overhead, legs straight. Lower back to floor.",execution:"Lift arms, shoulders, legs off floor. Hold. Back stays pressed down.",cue:"Be a banana — long, curved, rigid.",breathing:"Short controlled breaths.",mistakes:"Lower back arching off floor."}]}]},
{id:"B",title:"PULL + BICEPS",focus:"Back · Rear Delts · Biceps · Grip",circuits:[
{name:"CIRCUIT 1",subtitle:"VERTICAL PULL",rounds:4,restSeconds:60,exercises:[
{name:"Pull-Ups (shoulder width)",reps:"5–6",muscles:"Lats, teres major, biceps",setup:"Pronated grip, shoulder-width. Full dead hang.",execution:"Chin over bar, squeeze lats 1s. Lower over 3s to dead hang.",cue:"Drive elbows down toward hips.",breathing:"Exhale up, inhale down.",mistakes:"Kipping, not full dead hang."},
{name:"Chin-Ups (supinated)",reps:"5–7",muscles:"Biceps, lower lats",setup:"Palms facing you, shoulder-width. Dead hang.",execution:"Pull leading with chest. Squeeze biceps at top. 3s negative.",cue:"Curl the bar to your collarbone.",breathing:"Exhale up, inhale down.",mistakes:"Half reps, excessive kipping."},
{name:"Band Pull-Aparts",reps:"15–20",muscles:"Rear delts, rhomboids, mid traps",setup:"Band at shoulder height, straight arms, palms down.",execution:"Pull apart squeezing shoulder blades. Band to chest. Return.",cue:"Squeeze a finger between your shoulder blades.",breathing:"Exhale apart, inhale return.",mistakes:"Bending elbows, shrugging."}]},
{name:"CIRCUIT 2",subtitle:"BACK WIDTH & BICEPS",rounds:3,restSeconds:45,exercises:[
{name:"Wide-Grip Pull-Ups",reps:"4–6",muscles:"Upper lats, teres minor, rear delts",setup:"Wide pronated grip. Dead hang.",execution:"Chest to bar. Wider = harder. Control the negative.",cue:"Pull the bar apart as you go up.",breathing:"Exhale up, inhale down.",mistakes:"Not wide enough, momentum."},
{name:"Band Bicep Curls",reps:"15–18",muscles:"Biceps, brachialis",setup:"Stand on band, palms up, arms extended.",execution:"Curl to shoulders, squeeze 1s. Lower over 3s.",cue:"Pin elbows to ribs. Forearms only move.",breathing:"Exhale curl, inhale negative.",mistakes:"Swinging, elbows drifting."},
{name:"Band Bent-Over Row",reps:"12–15",muscles:"Lats, rhomboids, rear delts",setup:"Stand on band, hinge 45°, back flat.",execution:"Row to lower ribs, squeeze shoulder blades 1s. Control return.",cue:"Lead with elbows. Lawnmower motion.",breathing:"Exhale row, inhale return.",mistakes:"Rounding back, jerking."},
{name:"Isometric Chin-Up Hold",reps:"15–20 sec",muscles:"Biceps, forearms, lats",setup:"Top of chin-up, palms facing you, chin over bar.",execution:"Hold. Squeeze everything. Then lower as slowly as possible.",cue:"Crush the bar. Chest proud.",breathing:"Short breaths. Don't hold breath.",mistakes:"Chin drops quickly, no slow negative."}]},
{name:"FINISHER",subtitle:"GRIP & REAR DELTS",rounds:2,restSeconds:30,exercises:[
{name:"Dead Hang",reps:"30–40 sec",muscles:"Forearms, grip, shoulder decompression",setup:"Pronated grip, shoulder-width. Full bodyweight.",execution:"Active hang — shoulders down. Hold for grip endurance.",cue:"Shoulders in back pockets.",breathing:"Slow deep breaths.",mistakes:"Passive hang, holding breath."},
{name:"Band Face Pull",reps:"15",muscles:"Rear delts, external rotators",setup:"Band over bar at head height. Step back for tension.",execution:"Pull to face, elbows high, split band around head.",cue:"Finish in a double bicep pose.",breathing:"Exhale pull, inhale return.",mistakes:"Pulling to chest, elbows low."}]}]},
{id:"C",title:"LEGS + FULL BODY",focus:"Quads · Glutes · Core · Integrated",circuits:[
{name:"CIRCUIT 1",subtitle:"LOWER BODY",rounds:3,restSeconds:60,exercises:[
{name:"Bulgarian Split Squat",reps:"10 / leg",muscles:"Quads, glutes, hip flexors",setup:"Rear foot on chair. Front foot flat, torso upright.",execution:"Lower to parallel. Drive up through front heel. All reps one side.",cue:"Sit straight down, not forward.",breathing:"Inhale down, exhale up.",mistakes:"Knee caving in, leaning forward."},
{name:"Squat Pulse (bottom third)",reps:"15",muscles:"Quads (constant tension)",setup:"Feet shoulder-width, toes out. Arms forward.",execution:"Squat to parallel, stay low, pulse 6 inches. Never above halfway.",cue:"Stay in the pain cave.",breathing:"Quick controlled breaths.",mistakes:"Coming up too high, shifting to toes."},
{name:"Band Good Mornings",reps:"12–15",muscles:"Hamstrings, glutes, lower back",setup:"Band behind neck, stand on it shoulder-width.",execution:"Hip hinge back, torso nearly parallel. Drive hips forward.",cue:"Push butt toward wall behind you.",breathing:"Inhale hinge, exhale stand.",mistakes:"Rounding back, bending knees too much."},
{name:"Single-Leg Calf Raise",reps:"15 / side",muscles:"Gastrocnemius, soleus",setup:"One foot, other hooked behind. Hold for balance.",execution:"Full tiptoe, squeeze 1s. Lower slowly.",cue:"Push floor away with ball of foot.",breathing:"Exhale up, inhale down.",mistakes:"Bouncing, incomplete range."}]},
{name:"CIRCUIT 2",subtitle:"INTEGRATED POWER",rounds:3,restSeconds:45,exercises:[
{name:"Jump Squats",reps:"10",muscles:"Quads, glutes, calves (explosive)",setup:"Feet shoulder-width, toes slightly out.",execution:"Squat to parallel, explode upward. Land soft, immediately descend.",cue:"Quiet landings.",breathing:"Inhale squat, exhale jump.",mistakes:"Landing straight legs, shallow squat."},
{name:"Push-Up to Pike",reps:"8–10",muscles:"Chest, shoulders, core",setup:"Push-up position, hands shoulder-width.",execution:"Push-up → walk back to pike → pike push-up → walk forward. 1 rep.",cue:"Flow between positions with control.",breathing:"Exhale on each press.",mistakes:"Rushing, losing core tightness."},
{name:"Pull-Up (mixed grip)",reps:"4–5 / grip",muscles:"Lats, biceps (asymmetric)",setup:"One hand over, one under. Shoulder-width.",execution:"Chin over bar. 4–5 reps, switch grips, 4–5 more.",cue:"Pull evenly — resist twisting.",breathing:"Exhale up, inhale down.",mistakes:"Twisting, not switching."},
{name:"High Plank Knee-to-Opposite-Elbow",reps:"12 / side",muscles:"Obliques, transverse abs",setup:"High plank, core locked.",execution:"Cross-body crunch, slow. 2s each direction.",cue:"Reach knee to opposite elbow.",breathing:"Exhale across, inhale return.",mistakes:"Rushing, hips rocking."}]},

// STATE & HELPERS
// ═══════════════════════════════════════════════════════════════════════
var S={screen:'home',mode:'home',dayIndex:0,energyKey:'normal',stepIndex:0,exercises:[],
  completedSteps:new Set(),showDetail:false,sessionStart:null,
  history:[],restInterval:null,restTotal:0,restRemaining:0};

function getDays(){return S.mode==='home'?HOME_DAYS:S.mode==='gym'?GYM_DAYS:FINGER_DAYS}
function getModeColor(){return MODES[S.mode].color}

function buildList(di,ek){
  var day=getDays()[di],p=ENERGY[ek],list=[];
  day.circuits.forEach(function(c){
    var rnds=Math.max(1,c.rounds+p.roundOffset);
    var rest=c.restSeconds+p.restOffset;
    for(var r=0;r<rnds;r++){
      c.exercises.forEach(function(ex,ei){
        list.push({name:ex.name,reps:scaleReps(ex.reps,p.repMult),muscles:ex.muscles,
          setup:ex.setup,execution:ex.execution,cue:ex.cue,breathing:ex.breathing,mistakes:ex.mistakes,
          circuitName:c.name,circuitSubtitle:c.subtitle,round:r+1,totalRounds:rnds,
          restSeconds:rest,isLastInRound:ei===c.exercises.length-1,isLastRound:r===rnds-1});
      });
    }
  });
  return list;
}

function playBeep(f,d,c){try{var x=new(window.AudioContext||window.webkitAudioContext)();for(var i=0;i<c;i++){var o=x.createOscillator(),g=x.createGain();o.connect(g);g.connect(x.destination);o.frequency.value=f;o.type='square';g.gain.value=.15;var s=x.currentTime+i*.3;o.start(s);o.stop(s+d/1000)}}catch(e){}}
function loadHistory(){try{S.history=JSON.parse(localStorage.getItem('wk-h-v3')||'[]')}catch(e){S.history=[]}}
function saveHistory(){try{localStorage.setItem('wk-h-v3',JSON.stringify(S.history))}catch(e){}}
function $(id){return document.getElementById(id)}

// RENDER
// ═══════════════════════════════════════════════════════════════════════
function showScreen(n){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});$(n==='history'?'history-screen':n).classList.add('active');S.screen=n;window.scrollTo(0,0)}

function renderModes(){
  var row=$('mode-row');row.innerHTML='';
  ['home','gym','fingers'].forEach(function(k){
    var m=MODES[k],active=S.mode===k;
    var btn=document.createElement('button');btn.className='mode-btn';
    btn.style.background=active?m.color+'20':'transparent';
    btn.style.color=active?m.color:'var(--text-muted)';
    btn.innerHTML=m.icon+' '+m.label;
    btn.onclick=function(){S.mode=k;renderHome()};
    row.appendChild(btn);
  });
}

function renderEnergy(){
  var row=$('energy-row');row.innerHTML='';
  ['fresh','normal','tired'].forEach(function(k){
    var p=ENERGY[k],active=S.energyKey===k;
    var btn=document.createElement('button');btn.className='energy-btn';
    btn.style.background=active?p.color+'12':'var(--surface)';
    btn.style.borderColor=active?p.color:'var(--border)';
    btn.innerHTML='<div class="energy-icon">'+p.icon+'</div><div class="energy-name" style="color:'+(active?p.color:'var(--text-dim)')+'">'+p.label+'</div><div class="energy-desc" style="color:'+(active?'var(--text)':'var(--text-muted)')+'">'+p.desc+'</div>';
    btn.onclick=function(){S.energyKey=k;renderHome()};
    row.appendChild(btn);
  });
}

function renderHome(){
  renderModes();renderEnergy();
  var mc=getModeColor();
  $('mode-desc').textContent=MODES[S.mode].desc;
  $('mode-desc').style.color=mc+'90';
  var c=$('day-buttons');c.innerHTML='';
  var days=getDays(),ep=ENERGY[S.energyKey];
  days.forEach(function(day,i){
    var total=day.circuits.reduce(function(s,ci){return s+ci.exercises.length*Math.max(1,ci.rounds+ep.roundOffset)},0);
    var btn=document.createElement('button');btn.className='day-btn';
    btn.innerHTML='<div class="day-btn-top"><div><div class="day-btn-label"><span class="day-btn-id" style="color:'+mc+'">'+day.id+'</span><span class="day-btn-title">'+day.title+'</span></div><div class="day-btn-focus">'+day.focus+'</div><div class="day-btn-meta">'+total+' exercises · '+day.circuits.length+' blocks</div></div><div class="day-btn-arrow" style="color:'+mc+'60">›</div></div>';
    btn.onclick=function(){startWorkout(i)};
    c.appendChild(btn);
  });
  $('hist-count').textContent=S.history.length;
  showScreen('home');
}

function renderWorkout(){
  var day=getDays()[S.dayIndex],ex=S.exercises[S.stepIndex];if(!ex)return;
  var prog=S.exercises.length>0?Math.round(S.completedSteps.size/S.exercises.length*100):0;
  var ep=ENERGY[S.energyKey],mc=getModeColor();
  $('wk-topbar-center').innerHTML='<span style="color:'+mc+';font-size:13px;font-weight:800;letter-spacing:2px">'+day.id+'</span><span style="color:'+ep.color+';font-size:9px;font-weight:700;letter-spacing:1px;background:'+ep.color+'15;padding:2px 6px;border-radius:3px">'+ep.label+'</span><span style="color:'+mc+'80;font-size:9px;font-weight:700;letter-spacing:1px;background:'+mc+'15;padding:2px 6px;border-radius:3px">'+MODES[S.mode].label+'</span>';
  $('wk-step-count').textContent=(S.stepIndex+1)+'/'+S.exercises.length;
  $('wk-progress-bar').style.width=prog+'%';
  $('wk-circuit-info').innerHTML='<span class="wk-circuit-tag" style="background:'+mc+'15;border:1px solid '+mc+'50;color:'+mc+'">'+ex.circuitName+'</span><span class="wk-circuit-sub">'+ex.circuitSubtitle+'</span><span class="wk-round-tag">RND '+ex.round+'/'+ex.totalRounds+'</span>';
  $('wk-name').textContent=ex.name;
  $('wk-muscles').textContent=ex.muscles;
  $('wk-reps').textContent=ex.reps;
  $('wk-done-btn').style.background=mc;
  S.showDetail=false;
  var tog=$('wk-detail-toggle');tog.textContent='▸ SHOW FORM GUIDE';tog.classList.remove('open');
  var det=$('wk-detail');det.classList.remove('open');
  var secs=[{l:'SETUP',t:ex.setup,c:'var(--blue)'},{l:'EXECUTION',t:ex.execution,c:mc},{l:'CUE',t:ex.cue,c:'var(--amber)'},{l:'BREATHING',t:ex.breathing,c:'var(--text-dim)'},{l:'AVOID',t:ex.mistakes,c:'var(--red)'}];
  det.innerHTML=secs.map(function(s){return '<div class="wk-detail-section"><div class="wk-detail-label" style="color:'+s.c+'">'+s.l+'</div><div class="wk-detail-text">'+s.t+'</div></div>'}).join('');
  showScreen('workout');
}

function renderHistory(){
  var list=$('hist-list');
  if(!S.history.length){list.innerHTML='<div class="hist-empty">No sessions yet.</div>';showScreen('history');return}
  var grouped={};
  S.history.forEach(function(h){var d=new Date(h.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});if(!grouped[d])grouped[d]=[];grouped[d].push(h)});
  list.innerHTML=Object.entries(grouped).reverse().map(function(p){return '<div class="hist-group"><div class="hist-date">'+p[0].toUpperCase()+'</div>'+p[1].map(function(s){
    var mc=MODES[s.mode]?MODES[s.mode].color:'#E4A832';
    var ec=s.energy&&ENERGY[s.energy]?ENERGY[s.energy].color:'#999';
    return '<div class="hist-entry"><div><span style="color:'+mc+';font-weight:800;font-size:14px;margin-right:6px">'+s.day+'</span><span style="color:var(--text-dim);font-size:10px">'+s.title+'</span><span style="color:'+ec+';font-size:8px;font-weight:700;margin-left:6px;letter-spacing:1px">'+((s.energy&&ENERGY[s.energy])?ENERGY[s.energy].label:'')+'</span><span style="color:'+mc+'80;font-size:8px;font-weight:700;margin-left:4px;letter-spacing:1px">'+((s.mode&&MODES[s.mode])?MODES[s.mode].label:'')+'</span></div><div style="text-align:right"><div style="color:'+(s.completed?'var(--green-bright)':'var(--red)')+';font-size:11px;font-weight:700">'+(s.completed?'DONE':s.progress+'%')+'</div><div style="color:var(--text-muted);font-size:9px;margin-top:2px">'+s.duration+'</div></div></div>'}).join('')+'</div>'}).join('');
  showScreen('history');
}

function renderComplete(){
  var day=getDays()[S.dayIndex],ep=ENERGY[S.energyKey],mc=getModeColor();
  var dur=S.sessionStart?Math.round((Date.now()-S.sessionStart)/60000):0;
  $('complete-title').style.color=mc;
  $('complete-sub').textContent=day.id+' — '+day.title;
  $('complete-energy').textContent=ep.icon+' '+ep.label+' · '+MODES[S.mode].label;
  $('complete-energy').style.color=ep.color;
  $('complete-dur').textContent=dur+' minutes';
  $('complete-btn').style.background=mc;$('complete-btn').style.color='var(--bg)';
  showScreen('complete');
}

// ═══════════════════════════════════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════════════════════════════════
function startRest(sec){
  S.restTotal=sec;S.restRemaining=sec;var mc=getModeColor();
  var ov=$('rest-overlay');ov.classList.add('active');ov.classList.remove('flash');
  $('rest-number').style.color=mc;$('rest-number').style.textShadow='0 0 30px '+mc+'40';
  updateRest();
  S.restInterval=setInterval(function(){
    S.restRemaining--;
    if(S.restRemaining<=3&&S.restRemaining>0)playBeep(660,100,1);
    if(S.restRemaining<=0){clearInterval(S.restInterval);playBeep(1047,150,3);ov.classList.add('flash');setTimeout(endRest,1200)}
    updateRest();
  },1000);
}
function updateRest(){
  var n=$('rest-number'),mc=getModeColor();n.textContent=Math.max(0,S.restRemaining);
  n.classList.toggle('urgent',S.restRemaining<=3);
  var pct=(S.restTotal-S.restRemaining)/S.restTotal*100;
  var bar=$('rest-bar');bar.style.width=pct+'%';
  bar.style.background=S.restRemaining<=3?'var(--red)':mc;
}
function endRest(){clearInterval(S.restInterval);$('rest-overlay').classList.remove('active','flash');S.stepIndex++;renderWorkout()}

// ═══════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function startWorkout(di){
  S.dayIndex=di;S.exercises=buildList(di,S.energyKey);S.stepIndex=0;
  S.completedSteps=new Set();S.showDetail=false;S.sessionStart=Date.now();
  renderWorkout();if('wakeLock' in navigator)navigator.wakeLock.request('screen').catch(function(){});
}
function markDone(){
  S.completedSteps.add(S.stepIndex);var ex=S.exercises[S.stepIndex];
  if(S.stepIndex+1>=S.exercises.length){
    var dur=Math.round((Date.now()-S.sessionStart)/60000);var day=getDays()[S.dayIndex];
    S.history.push({date:new Date().toISOString(),day:day.id,title:day.title,completed:true,progress:100,duration:dur+' min',energy:S.energyKey,mode:S.mode});
    saveHistory();renderComplete();return;
  }
  if(ex.isLastInRound)startRest(ex.restSeconds);
  else{S.stepIndex++;renderWorkout()}
}
function skipEx(){if(S.stepIndex+1<S.exercises.length){S.stepIndex++;renderWorkout()}}
function endSession(){
  if(S.completedSteps.size>0){
    var dur=Math.round((Date.now()-S.sessionStart)/60000);var day=getDays()[S.dayIndex];
    var prog=Math.round(S.completedSteps.size/S.exercises.length*100);
    S.history.push({date:new Date().toISOString(),day:day.id,title:day.title,completed:false,progress:prog,duration:dur+' min',energy:S.energyKey,mode:S.mode});
    saveHistory();
  }
  renderHome();
}

// SWIPE
var touchX=0;
document.addEventListener('touchstart',function(e){touchX=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',function(e){
  if(S.screen!=='workout')return;var d=e.changedTouches[0].clientX-touchX;
  if(Math.abs(d)>60){if(d<0&&S.stepIndex+1<S.exercises.length){S.stepIndex++;renderWorkout()}else if(d>0&&S.stepIndex>0){S.stepIndex--;renderWorkout()}}
});

// EVENTS
$('history-btn').onclick=renderHistory;
$('hist-back-btn').onclick=renderHome;
$('wk-end-btn').onclick=endSession;
$('wk-done-btn').onclick=markDone;
$('wk-skip-btn').onclick=skipEx;
$('rest-skip-btn').onclick=endRest;
$('complete-btn').onclick=renderHome;
$('clear-btn').onclick=function(){if(confirm('Clear all history?')){S.history=[];saveHistory();renderHome()}};
$('wk-detail-toggle').onclick=function(){
  S.showDetail=!S.showDetail;var t=$('wk-detail-toggle'),d=$('wk-detail');
  t.textContent=S.showDetail?'▾ HIDE FORM GUIDE':'▸ SHOW FORM GUIDE';
  t.classList.toggle('open',S.showDetail);d.classList.toggle('open',S.showDetail);
};

// SERVICE WORKER
if('serviceWorker' in navigator){var sw="var C='ct-v3';self.addEventListener('install',function(e){e.waitUntil(caches.open(C).then(function(c){return c.addAll(['/'])}).then(function(){return self.skipWaiting()}))});self.addEventListener('activate',function(e){e.waitUntil(caches.keys().then(function(k){return Promise.all(k.filter(function(x){return x!==C}).map(function(x){return caches.delete(x)}))}).then(function(){return self.clients.claim()}))});self.addEventListener('fetch',function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(res){if(res.status===200){var c=res.clone();caches.open(C).then(function(cache){cache.put(e.request,c)})}return res}).catch(function(){return caches.match('/')})}))});";navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){})}

// INIT
loadHistory();renderHome();
</script>
