<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 60" width="150" height="60" role="img" aria-label="7Bit">
  <title>7Bit</title>
  <!-- Pixel-art style logotype: 7BIT in monospace block letterforms -->
  <!-- Each character built from 4x5 pixel grid at 6px per pixel -->
  <g fill="#0F110C">
    <!-- "7" — x:0 -->
    <rect x="0"  y="10" width="24" height="6"/>  <!-- top bar -->
    <rect x="18" y="16" width="6"  height="6"/>  <!-- top-right -->
    <rect x="12" y="22" width="6"  height="6"/>  <!-- diagonal -->
    <rect x="6"  y="28" width="6"  height="6"/>  <!-- diagonal -->
    <rect x="6"  y="34" width="6"  height="12"/> <!-- stem -->

    <!-- "B" — x:32 -->
    <rect x="32" y="10" width="6"  height="36"/> <!-- left stem -->
    <rect x="38" y="10" width="12" height="6"/>  <!-- top cap -->
    <rect x="38" y="26" width="12" height="6"/>  <!-- mid bar -->
    <rect x="38" y="40" width="12" height="6"/>  <!-- bot cap -->
    <rect x="50" y="16" width="6"  height="10"/> <!-- top bulge -->
    <rect x="50" y="32" width="6"  height="8"/>  <!-- bot bulge -->

    <!-- "I" — x:64 -->
    <rect x="64" y="10" width="18" height="6"/>  <!-- top cap -->
    <rect x="70" y="16" width="6"  height="20"/> <!-- stem -->
    <rect x="64" y="40" width="18" height="6"/>  <!-- bot cap -->

    <!-- "T" — x:90 -->
    <rect x="90"  y="10" width="30" height="6"/> <!-- top bar -->
    <rect x="102" y="16" width="6"  height="30"/><!-- stem -->
  </g>
</svg>
